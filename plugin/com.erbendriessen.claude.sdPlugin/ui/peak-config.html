<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="../libs/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Countdown">
			<sdpi-checkbox setting="showCountdown" checked></sdpi-checkbox>
		</sdpi-item>

		<sdpi-item label="Background">
			<sdpi-select id="bgSelect" setting="background" default="dark">
				<option value="dark">Dark</option>
				<option value="light">Light</option>
				<option value="transparent">Transparent</option>
				<option value="custom">Custom colour…</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item id="customColourItem" label="Custom colour" style="display: none">
			<sdpi-color setting="bgColor" default="#1d9e75"></sdpi-color>
		</sdpi-item>

		<details>
			<summary>Advanced</summary>
			<sdpi-item label="Peak start (UTC hour)">
				<sdpi-range setting="peakStartUTC" min="0" max="23" step="1" default="13" showlabels></sdpi-range>
			</sdpi-item>
			<sdpi-item label="Peak end (UTC hour)">
				<sdpi-range setting="peakEndUTC" min="0" max="23" step="1" default="19" showlabels></sdpi-range>
			</sdpi-item>
		</details>

		<script>
			const bgSelect = document.getElementById("bgSelect");
			const customItem = document.getElementById("customColourItem");
			const syncCustom = () => {
				customItem.style.display = bgSelect && bgSelect.value === "custom" ? "" : "none";
			};
			bgSelect.addEventListener("change", syncCustom);
			setInterval(syncCustom, 250);
		</script>
	</body>
</html>
